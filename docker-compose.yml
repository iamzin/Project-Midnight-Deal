services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deal
      MYSQL_USER: deal
      MYSQL_PASSWORD: deal
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app1:
    build: .
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      INSTANCE_ID: app1
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  app2:
    build: .
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      INSTANCE_ID: app2
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8080:8080"]
    depends_on: [app1, app2]
